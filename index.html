    <!-- Force Unregister Stale PWA Service Worker & Purge Caches to show latest update -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function(boolean) {
              if (boolean) {
                console.log('Stale service worker unregistered successfully.');
                // Only reload if we actually unregistered to prevent infinite loops
                window.location.reload();
              }
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
            console.log('Stale cache deleted: ' + name);
          }
        });
      }
    </script>
